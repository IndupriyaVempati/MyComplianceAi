services:
  postgres:
    image: pgvector/pgvector:pg16
    healthcheck:
      test: pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
      start_interval: 1s
      start_period: 5s
      interval: 5s
      retries: 5
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - ./postgres-volume:/var/lib/postgresql/data
  postgres-setup:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    env_file:
      - .env
    command: ["-path", "/migrations", "-database", "postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:$POSTGRES_PORT/$POSTGRES_DB?sslmode=disable", "up"]
  backend:
    container_name: mycomplianceai-backend
    build:
      context: backend
    ports:
      - "8100:8000" # Backend is accessible on localhost:8100
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./backend:/backend
      - ${GOVERNMENT_DOCS_DIR}:/govt_docs:ro
    environment:
      POSTGRES_HOST: "postgres"
      AUTH_TYPE: "jwt_local"
      JWT_ISS: "surtn"
      JWT_AUD: "surtn"
      # Base64 encoded 'mysecretkey'
      JWT_DECODE_KEY_B64: "bXlzZWNyZXRrZXk="
      JWT_ALG: "HS256"
      GOVERNMENT_DOCS_DIR: "/govt_docs"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  frontend:
    container_name: mycomplianceai-frontend
    build:
      context: frontend
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/frontend/src
      - ./frontend/public:/frontend/public
      - ./frontend/tailwind.config.js:/frontend/tailwind.config.js
      - ./frontend/postcss.config.js:/frontend/postcss.config.js
      - ./frontend/index.html:/frontend/index.html
      - ./frontend/vite.config.ts:/frontend/vite.config.ts
    ports:
      - "5173:5173" # Frontend is accessible on localhost:5173
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
